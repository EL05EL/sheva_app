name: sheva_app
description: "SHEVA - Solidarity Hub for Equality, Voice, and Action"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Storage
  shared_preferences: ^2.5.0
  
  # URL & Sharing
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  
  # Camera & Gallery
  image_picker: ^1.1.2
  
  # Location
  geolocator: ^13.0.0
  geocoding: ^2.1.0
  
  # State Management
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Tidak ada assets karena menggunakan fallback icon